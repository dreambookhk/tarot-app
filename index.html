<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔羅占卜輔助工具</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>神秘學塔羅占卜</h1>
            <p class="subtitle">靜心冥想你的問題，然後點擊洗牌</p>
        </header>

        <div class="control-panel">
            <button id="shuffle-btn" class="btn">靈性洗牌</button>
        </div>

        <div class="card-spread">
            <div class="card-slot">
                <span class="slot-title">過去 (Past)</span>
                <div class="card" id="card-0" onclick="flipCard(0)">
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back" id="back-0"></div>
                    </div>
                </div>
            </div>
            
            <div class="card-slot">
                <span class="slot-title">現在 (Present)</span>
                <div class="card" id="card-1" onclick="flipCard(1)">
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back" id="back-1"></div>
                    </div>
                </div>
            </div>

            <div class="card-slot">
                <span class="slot-title">未來 (Future)</span>
                <div class="card" id="card-2" onclick="flipCard(2)">
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back" id="back-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="interpretation-zone" class="interpretation-zone">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
